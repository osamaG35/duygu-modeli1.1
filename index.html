<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Duygu Analizi (V8 - Fonksiyonel)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        h1 { margin-bottom: 5px; color: #00adb5; }
        p { color: #888; margin-bottom: 20px; }
        .container {
            position: relative;
            width: 400px;
            height: 400px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            border: 2px solid #333;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Ayna görüntüsü */
        }
        .status-box {
            margin-top: 20px;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 24px;
            font-weight: bold;
            background-color: #1e1e1e;
            border: 1px solid #444;
            min-width: 200px;
            text-align: center;
        }
        #loading-text {
            color: #ffb703;
            font-size: 18px;
            margin-top: 10px;
        }
        /* Hata Mesajı Kutusu */
        #error-log {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background-color: #ff4d4d;
            color: white;
            border-radius: 8px;
            max-width: 500px;
            width: 90%;
            word-wrap: break-word;
            font-family: monospace;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <h1>Canlı Duygu Tanıma</h1>
    <p>Model v8 (Fonksiyonel Mimari Test Sayfası)</p>

    <div class="container">
        <video id="webcam" autoplay playsinline muted></video>
    </div>

    <div id="loading-text">Sistem başlatılıyor, lütfen bekleyin...</div>
    <div id="result" class="status-box">---</div>
    
    <div id="error-log"></div>

    <script>
        const video = document.getElementById('webcam');
        const resultTxt = document.getElementById('result');
        const loadingTxt = document.getElementById('loading-text');
        const errorLog = document.getElementById('error-log');

        let model;
        const EMOTIONS = ['Kızgın (Angry)', 'Mutlu (Happy)', 'Üzgün (Sad)', 'Nötr (Neutral)'];

        // Hata Gösterme Fonksiyonu
        function showError(msg) {
            loadingTxt.style.display = 'none';
            errorLog.style.display = 'block';
            errorLog.innerText = "Hata Detayı:\n" + msg;
            console.error(msg);
        }

        // 1. Kamerayı Başlat
        async function setupWebcam() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: 400, height: 400, facingMode: 'user' },
                    audio: false
                });
                video.srcObject = stream;
                return new Promise((resolve) => video.onloadedmetadata = () => resolve());
            } catch (err) {
                showError("Kamera açma başarısız oldu. İzin verdiğinizden emin olun: " + err.message);
            }
        }

        // 2. Modeli Yükle
        async function loadModel() {
            try {
                loadingTxt.innerText = "Model dosyaları GitHub'dan çekiliyor...";
                
                // KESİN ÇÖZÜM: Uzun link yerine göreceli yol kullanıyoruz. 
                // model.json ve .bin dosyaları index.html ile AYNI klasörde olmalı.
                model = await tf.loadLayersModel('./model.json?t=' + Date.now());
                
                loadingTxt.style.display = 'none';
                resultTxt.innerText = "Model Hazır! Yayındasınız.";
                resultTxt.style.color = "#00adb5";
                
                // Tahmin döngüsünü başlat
                trackEmotions();
            } catch (err) {
                showError("Model yüklenirken hata oluştu!\n" + err.message + 
                          "\n\nİpucu: model.json içindeki 'batch_shape' kelimesini 'batch_input_shape' yaptığınızdan emin olun.");
            }
        }

        // 3. Canlı Tahmin Döngüsü
        async function trackEmotions() {
            if (!model) return;

            tf.tidy(() => {
                // Kameradan görüntüyü al
                let img = tf.browser.fromPixels(video);
                
                // 48x48 boyutuna küçült
                img = tf.image.resizeBilinear(img, [48, 48]);
                
                // Gri tona çevir (3 kanaldan 1 kanala düşür)
                img = img.mean(2).expandDims(-1);
                
                // Normalize et (0-1 arasına çek)
                img = img.toFloat().div(255.0);
                
                // Batch boyutu ekle -> [1, 48, 48, 1]
                img = img.expandDims(0);

                // Modeli besle ve tahmin al
                const prediction = model.predict(img);
                const scores = prediction.dataSync();
                
                // En yüksek skorlu duyguyu bul
                const maxIndex = prediction.argMax(-1).dataSync()[0];
                
                // Ekrana yazdır
                resultTxt.innerText = EMOTIONS[maxIndex];
                
                // Duyguya göre renk değiştir (Görsel efekt)
                if(maxIndex === 1) resultTxt.style.color = "#4caf50"; // Mutlu -> Yeşil
                else if(maxIndex === 0 || maxIndex === 2) resultTxt.style.color = "#f44336"; // Kızgın/Üzgün -> Kırmızı
                else resultTxt.style.color = "#ffffff"; // Nötr -> Beyaz
            });

            // Her 200 milisaniyede bir tekrarla (Kamerayı kasmaz, akıcı çalışır)
            setTimeout(trackEmotions, 200);
        }

        // Her şeyi sırayla çalıştır
        async function init() {
            await setupWebcam();
            await loadModel();
        }

        window.onload = init;
    </script>
</body>
</html>
