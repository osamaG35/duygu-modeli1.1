<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bugün nasılsın canım</title>
<script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>
<style>
  :root {
    --bg: #1a0e14;
    --bg-elevated: #25131b;
    --bg-card: #2e1620;
    --line: #4a1f30;
    --line-bright: #6b2a44;
    --text: #ffeef3;
    --text-dim: #d9a3b8;
    --text-faint: #8c5a6d;
    --accent: #ff5c8a;
    --accent-deep: #e0356b;
    --pulse: #ffb3c6;
    --mono: 'JetBrains Mono', 'SF Mono', 'Courier New', monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }
  body { display: flex; flex-direction: column; align-items: center; padding: 28px 20px 40px; background: radial-gradient(ellipse 120% 60% at 50% 0%, #3a1826 0%, var(--bg) 70%); }
  .page { width: 100%; max-width: 480px; }

  .header { text-align: center; margin-bottom: 22px; }
  .heart { font-size: 28px; margin-bottom: 6px; }
  h1 { font-size: 23px; font-weight: 600; line-height: 1.35; color: var(--text); }
  .sub { margin-top: 6px; font-size: 14px; color: var(--text-dim); }

  .status-bar { display: flex; align-items: center; gap: 10px; padding: 12px 16px; background: var(--bg-elevated); border: 1px solid var(--line); border-radius: 14px; margin-bottom: 18px; font-size: 12.5px; color: var(--text-dim); }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-faint); flex-shrink: 0; }
  .status-dot.loading { background: var(--pulse); animation: blink 1s infinite; }
  .status-dot.ready { background: #6ee7b7; }
  .status-dot.error { background: var(--accent); }
  @keyframes blink { 50% { opacity: 0.3; } }

  .camera-wrap { position: relative; width: 100%; aspect-ratio: 4/3; background: var(--bg-card); border: 1px solid var(--line); border-radius: 20px; overflow: hidden; margin-bottom: 14px; }
  video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
  video { transform: scaleX(-1); }
  canvas { transform: scaleX(-1); }
  .placeholder { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; color: var(--text-faint); font-size: 13px; text-align: center; padding: 24px; }
  .start-btn { background: var(--accent); color: #2a0816; border: none; border-radius: 14px; padding: 13px 26px; font-size: 14.5px; font-weight: 600; font-family: var(--sans); cursor: pointer; }
  .start-btn:hover { filter: brightness(1.08); }

  .alt-row { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
  .alt-line { flex: 1; height: 1px; background: var(--line); }
  .alt-text { font-size: 12px; color: var(--text-faint); white-space: nowrap; }
  .upload-label { display: block; text-align: center; padding: 13px; background: var(--bg-elevated); border: 1px solid var(--line); border-radius: 14px; font-size: 13.5px; color: var(--text-dim); cursor: pointer; margin-bottom: 18px; }
  .upload-label:hover { border-color: var(--line-bright); color: var(--text); }
  .upload-label input[type=file] { display: none; }

  .result-card { background: var(--bg-card); border: 1px solid var(--line); border-radius: 18px; padding: 22px; margin-bottom: 16px; }
  .result-main { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 18px; }
  .result-emotion { font-size: 26px; font-weight: 700; color: var(--text); }
  .result-confidence { font-size: 13px; color: var(--text-dim); }
  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
  .bar-label { font-size: 12px; color: var(--text-dim); width: 56px; flex-shrink: 0; }
  .bar-track { flex: 1; height: 7px; background: var(--bg-elevated); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--pulse); border-radius: 4px; transition: width 0.25s ease; }
  .bar-fill.top { background: var(--accent); }
  .bar-pct { font-size: 11px; color: var(--text-faint); width: 36px; text-align: right; flex-shrink: 0; }

  .send-btn { width: 100%; margin-top: 18px; background: var(--accent-deep); color: #ffeef3; border: none; border-radius: 14px; padding: 15px; font-size: 15px; font-weight: 600; font-family: var(--sans); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .send-btn:hover { filter: brightness(1.1); }
  .send-btn:disabled { background: var(--bg-elevated); color: var(--text-faint); cursor: not-allowed; }

  .song-card { background: linear-gradient(135deg, #3a1626, #2e1620); border: 1px solid var(--accent); border-radius: 18px; padding: 22px; margin-top: 16px; display: none; text-align: center; }
  .song-card.show { display: block; animation: slide-in 0.35s ease; }
  @keyframes slide-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .song-label { font-size: 12px; color: var(--pulse); margin-bottom: 10px; }
  .song-title { font-size: 19px; font-weight: 700; margin-bottom: 4px; color: var(--text); }
  .song-artist { font-size: 14px; color: var(--text-dim); margin-bottom: 14px; }

  /* Müzik çaların şık görünmesi için ufak bir kaplayıcı alanı */
  .player-container { width: 100%; overflow: hidden; border-radius: 10px; margin-top: 10px; height: 60px; pointer-events: none; }

  .esp-status { margin-top: 14px; padding: 11px 15px; background: var(--bg-elevated); border: 1px solid var(--line); border-radius: 12px; font-size: 12px; color: var(--text-faint); text-align: center; }
  .footer-note { margin-top: 22px; font-size: 11px; color: var(--text-faint); text-align: center; line-height: 1.6; }
</style>
</head>
<body>

<div class="page">
  <div class="header">
    <div class="heart">♡</div>
    <h1>bugün nasıl hissediyorsun canım?</h1>
    <div class="sub">sana göre bir şarkı bulayım</div>
  </div>

  <div class="status-bar">
    <div class="status-dot loading" id="statusDot"></div>
    <span id="statusText">hazırlanıyorum...</span>
  </div>

  <div class="camera-wrap" id="cameraWrap">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="overlay"></canvas>
    <div class="placeholder" id="placeholder">
      <span>yüzünü görmek istiyorum</span>
      <button class="start-btn" id="startBtn">kamerayı aç</button>
    </div>
  </div>

  <div class="alt-row">
    <div class="alt-line"></div>
    <span class="alt-text">ya da</span>
    <div class="alt-line"></div>
  </div>

  <label class="upload-label" for="fileInput">
    bir fotoğrafını yükle
    <input type="file" id="fileInput" accept="image/*">
  </label>

  <div class="result-card">
    <div class="result-main">
      <span class="result-emotion" id="resultEmotion">—</span>
      <span class="result-confidence" id="resultConfidence"></span>
    </div>
    <div id="barsContainer"></div>
    <button class="send-btn" id="sendBtn" disabled>gönder ♡</button>
  </div>

  <div class="song-card" id="songCard">
    <div class="song-label">sana bunu dinletmek istiyorum</div>
    <div class="song-title" id="songTitle">—</div>
    <div class="song-artist" id="songArtist">—</div>
    <div class="player-container">
      <div id="ytPlayer"></div>
    </div>
  </div>

  <div class="esp-status" id="espStatus">bağlantı bekleniyor...</div>
  <div class="footer-note">her şey sana özel · seni düşünerek yapıldı</div>
</div>

<script>
  const TURKCE_ISIMLER = { angry: 'Kızgın', happy: 'Mutlu', neutral: 'Sakin', sad: 'Üzgün' };

  // ============================================================
  // YOUTUBE VIDEO ID'LERI ILE SARKI LISTESI
  // videoId kısımlarını istediğin YouTube videolarının linkindeki ID ile değiştirebilirsin.
  // ============================================================
  const SARKI_LISTESI = {
    happy: [
      { title: "Seni Dert Etmeler", artist: "Madrigal", videoId: "h-g8g-rEwK0" },
      { title: "Dynamite", artist: "BTS", videoId: "gdZLi9oWNZg" }
    ],
    sad: [
      { title: "Dip", artist: "Madrigal", videoId: "gZ4chK9fUkg" },
      { title: "Spring Day", artist: "BTS", videoId: "xeLyYZA8_4s" }
    ],
    angry: [
      { title: "Kuffar", artist: "Ceza", videoId: "9o48gYvT82M" },
      { title: "MIC Drop", artist: "BTS", videoId: "kTlv5_NVdgc" }
    ],
    neutral: [
      { title: "Belki", artist: "Dedublüman", videoId: "fyS8gcoVsnM" },
      { title: "Life Goes On", artist: "BTS", videoId: "-5q5mZ0GZhg" }
    ],
  };

  function rastgeleSarkiSec(duygu) {
    const liste = SARKI_LISTESI[duygu] || [];
    if (liste.length === 0) return { title: "Liste boş", artist: "—", videoId: "" };
    return liste[Math.floor(Math.random() * liste.length)];
  }

  let model = null;
  let classNames = ['angry', 'happy', 'neutral', 'sad'];
  let faceApiReady = false;
  let predictionLoop = null;
  let lastPrediction = null;
  let ytPlayer = null;

  // ============================================================
  // ESP32'NIN YENI IP ADRESI (GÜNCELLENDİ)
  // ============================================================
  const ESP32_BASE_URL = 'http://192.168.1.103';

  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const video = document.getElementById('video');
  const overlay = document.getElementById('overlay');
  const placeholder = document.getElementById('placeholder');
  const startBtn = document.getElementById('startBtn');
  const fileInput = document.getElementById('fileInput');
  const resultEmotion = document.getElementById('resultEmotion');
  const resultConfidence = document.getElementById('resultConfidence');
  const barsContainer = document.getElementById('barsContainer');
  const sendBtn = document.getElementById('sendBtn');
  const songCard = document.getElementById('songCard');
  const songTitle = document.getElementById('songTitle');
  const songArtist = document.getElementById('songArtist');
  const espStatus = document.getElementById('espStatus');

  // YouTube API Hazır Olduğunda Tetiklenir
  function onYouTubeIframeAPIReady() {
    ytPlayer = new YT.Player('ytPlayer', {
      height: '60',
      width: '100%',
      videoId: '', // Başlangıçta boş
      playerVars: {
        'playsinline': 1,
        'autoplay': 0,
        'controls': 0
      }
    });
  }

  function setStatus(state, text) {
    statusDot.className = 'status-dot ' + state;
    statusText.textContent = text;
  }

  function renderBars(probs) {
    let sorted = classNames.map((name, i) => ({ name, prob: probs[i] }))
      .sort((a, b) => b.prob - a.prob);

    const NOTR_GUVEN_ESIGI = 0.55;
    const KARARSIZLIK_FARKI = 0.12;

    if (sorted[0].name === 'neutral' && sorted[0].prob < NOTR_GUVEN_ESIGI) {
      const fark = sorted[0].prob - sorted[1].prob;
      if (fark < KARARSIZLIK_FARKI && sorted[1].name !== 'neutral') {
        [sorted[0], sorted[1]] = [sorted[1], sorted[0]];
      }
    }

    resultEmotion.textContent = TURKCE_ISIMLER[sorted[0].name] || sorted[0].name;
    resultConfidence.textContent = `%${(sorted[0].prob * 100).toFixed(1)} eminim`;
    lastPrediction = { emotion: sorted[0].name, confidence: sorted[0].prob };
    sendBtn.disabled = false;

    barsContainer.innerHTML = sorted.map((item, i) => `
      <div class="bar-row">
        <span class="bar-label">${TURKCE_ISIMLER[item.name] || item.name}</span>
        <div class="bar-track"><div class="bar-fill ${i === 0 ? 'top' : ''}" style="width:${(item.prob * 100).toFixed(1)}%"></div></div>
        <span class="bar-pct">${(item.prob * 100).toFixed(0)}%</span>
      </div>
    `).join('');
  }

  async function loadModel() {
    try {
      setStatus('loading', 'hazırlanıyorum...');
      const tfRef = (typeof tf !== 'undefined') ? tf : faceapi.tf;
      window.tf = tfRef;

      model = await tfRef.loadLayersModel('https://raw.githubusercontent.com/osamaG35/duygu-modeli1.1/refs/heads/main/model.json?v=2');
      setStatus('loading', 'biraz daha sabret...');

      await faceapi.nets.tinyFaceDetector.loadFromUri('https://cdn.jsdelivr.net/gh/vladmandic/face-api/model/');
      faceApiReady = true;

      setStatus('ready', 'hazırım, kamerayı aç');
    } catch (err) {
      console.error(err);
      setStatus('error', 'bir şeyler ters gitti: ' + err.message);
    }
  }

  fetch('https://raw.githubusercontent.com/osamaG35/duygu-modeli/refs/heads/main/class_names_4cat.json')
    .then(r => r.json())
    .then(names => { classNames = names; })
    .catch(() => {});

  loadModel();

  startBtn.addEventListener('click', async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 480, height: 360, facingMode: 'user' } });
      video.srcObject = stream;
      placeholder.style.display = 'none';
      video.onloadedmetadata = () => {
        overlay.width = video.videoWidth;
        overlay.height = video.videoHeight;
        startPredictionLoop();
      };
    } catch (err) {
      setStatus('error', 'kameraya izin vermedin');
    }
  });

  function startPredictionLoop() {
    if (predictionLoop) clearInterval(predictionLoop);
    predictionLoop = setInterval(async () => {
      if (!model || !faceApiReady) return;
      await predictFromVideo();
    }, 600);
  }

  async function predictFromVideo() {
    const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 224 }));
    const ctx = overlay.getContext('2d');
    ctx.clearRect(0, 0, overlay.width, overlay.height);

    if (!detection) {
      setStatus('ready', 'seni arıyorum...');
      return;
    }
    setStatus('ready', 'seni görüyorum');

    const box = detection.box;
    ctx.strokeStyle = '#ff5c8a';
    ctx.lineWidth = 3;
    ctx.strokeRect(box.x, box.y, box.width, box.height);

    const probs = await runModelOnFaceBox(video, box);
    if (probs) renderBars(probs);
  }

  async function runModelOnFaceBox(sourceEl, box) {
    const pad = box.width * 0.1;
    const x0 = Math.max(0, box.x - pad);
    const y0 = Math.max(0, box.y - pad);
    const w = Math.min(sourceEl.videoWidth - x0, box.width + pad * 2);
    const h = Math.min(sourceEl.videoHeight - y0, box.height + pad * 2);

    const cropCanvas = document.createElement('canvas');
    cropCanvas.width = 48;
    cropCanvas.height = 48;
    const cctx = cropCanvas.getContext('2d');
    cctx.drawImage(sourceEl, x0, y0, w, h, 0, 0, 48, 48);

    const imageData = cctx.getImageData(0, 0, 48, 48);
    const gray = new Float32Array(48 * 48);
    for (let i = 0; i < 48 * 48; i++) {
      const r = imageData.data[i * 4], g = imageData.data[i * 4 + 1], b = imageData.data[i * 4 + 2];
      gray[i] = (0.299 * r + 0.587 * g + 0.114 * b) / 255.0;
    }

    const inputTensor = window.tf.tensor(gray, [1, 48, 48, 1]);
    const prediction = model.predict(inputTensor);
    const probs = await prediction.data();
    inputTensor.dispose();
    prediction.dispose();
    return Array.from(probs);
  }

  fileInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file || !model || !faceApiReady) return;

    const img = new Image();
    img.onload = async () => {
      const detection = await faceapi.detectSingleFace(img, new faceapi.TinyFaceDetectorOptions({ inputSize: 224 }));
      if (!detection) {
        setStatus('error', 'fotoğrafında seni bulamadım');
        return;
      }
      const probs = await runModelOnFaceBox(img, detection.box);
      if (probs) renderBars(probs);
      setStatus('ready', 'fotoğrafını gördüm');
    };
    img.src = URL.createObjectURL(file);
  });

  // ESP32'YE GÖNDERME BUTONU
  sendBtn.addEventListener('click', async () => {
    if (!lastPrediction) return;
    if (predictionLoop) clearInterval(predictionLoop);

    espStatus.textContent = 'gönderiyorum...';

    try {
      const response = await fetch(`${ESP32_BASE_URL}/api/duygu`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          emotion: lastPrediction.emotion,
          confidence: lastPrediction.confidence
        })
      });

      if (response.ok) {
        espStatus.textContent = 'gönderdim, cihaz üzerinden onayla veya tekrar dene ♡';
        pollForConfirmation();
      } else {
        espStatus.textContent = 'gönderemedim (hata: ' + response.status + ')';
      }
    } catch (err) {
      espStatus.textContent = 'bağlanamadım: ' + err.message;
    }
  });

  function pollForConfirmation() {
    const interval = setInterval(async () => {
      try {
        const response = await fetch(`${ESP32_BASE_URL}/api/durum`);
        const data = await response.json();

        if (data.onaylandi) {
          clearInterval(interval);
          espStatus.textContent = 'cihazdan onayladın, şarkını çalıyorum...';

          // Şarkıyı seç ve arayüzde göster
          const sarki = rastgeleSarkiSec(lastPrediction.emotion);
          songTitle.textContent = sarki.title;
          songArtist.textContent = sarki.artist;
          songCard.classList.add('show');

          // YouTube Videosunu Otomatik Oynat
          if (ytPlayer && sarki.videoId) {
            ytPlayer.loadVideoById(sarki.videoId);
            ytPlayer.playVideo();
          }

          // Seçilen şarkıyı LCD ekrana da yolla
          await fetch(`${ESP32_BASE_URL}/api/sarki`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title: sarki.title, artist: sarki.artist })
          });

          espStatus.textContent = 'işte şarkın ♡';
        } else if (data.tekrar_dene) {
          clearInterval(interval);
          espStatus.textContent = 'tekrar denemek istedin, kameraya bak';
          startPredictionLoop();
        }
      } catch (err) {
        // Hata durumunda sessizce devam et (polling kesilmesin)
      }
    }, 1000);
  }
</script>

</body>
</html>
